version: "3.9"

# ============================================================
# enterprise-ai-sandbox — Local Infrastructure Stack
#
# Services:
#   postgres  — PostgreSQL 16 + pgvector extension
#   pgadmin   — Browser-based DB administration (dev only)
#
# Usage:
#   docker compose up -d postgres
#   docker compose up -d          # all services
#   docker compose logs -f postgres
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 with pgvector pre-installed
  # Image: pgvector/pgvector:pg16 bundles the extension.
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-enterprise_ai}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-enterprise_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai_net

  # ----------------------------------------------------------
  # pgAdmin 4 — web UI at http://localhost:5050
  # Credentials: admin@local.dev / admin
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: enterprise_ai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_net
    profiles:
      - dev-tools

  # ----------------------------------------------------------
  # Ollama — Local LLM server (CPU / MPS / CUDA)
  # Pull models after start: docker exec ollama ollama pull llama3.2
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: enterprise_ai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_net
    profiles:
      - local-llm
    # Uncomment for GPU passthrough on Linux:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ai_net:
    driver: bridge
